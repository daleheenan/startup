[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[build.env]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
# CRITICAL: 180s allows time for database migrations on cold start
# Default 30s is insufficient for most production apps
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Persistent storage for SQLite or file-based data
# Change 'myapp_data' to your project name
[[mounts]]
source = "myapp_data"
destination = "/data"
